name: Atualizar Radar Fundamentalista

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

jobs:
  atualizar-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml sqlalchemy psycopg2-binary python-dotenv

      - name: Rodar atualização do Radar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/atualiza_50_empresas.py
