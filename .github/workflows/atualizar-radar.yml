name: Atualizar Radar Fundamentalista

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

jobs:
  atualizar-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml sqlalchemy psycopg2-binary python-dotenv

      - name: Criar arquivo .env temporário
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL não configurada nos Secrets do GitHub"
            exit 1
          fi
          echo "DATABASE_URL=$DATABASE_URL" > .env

      - name: Atualizar empresas fundamentalistas
        run: |
          python scripts/atualiza_50_empresas.py

      - name: Atualizar indicadores macro
        run: |
          python scripts/coleta_bcb_macro.py
